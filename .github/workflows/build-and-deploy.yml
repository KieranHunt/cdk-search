name: Build and Deploy

on:
  schedule:
    # Rebuild daily at midnight UTC to pick up new CDK releases
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only run one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Shallow clone of the CDK repo for the scope-map.json only.
      # We use a sparse checkout to avoid downloading the full multi-GB repo.
      - name: Clone aws-cdk (sparse — scope-map only)
        run: |
          git clone \
            --depth 1 \
            --filter=blob:none \
            --sparse \
            https://github.com/aws/aws-cdk.git aws-cdk
          cd aws-cdk
          git sparse-checkout set packages/aws-cdk-lib/scripts

      - name: Install script dependencies
        working-directory: scripts
        run: bun install

      - name: Extract L1 construct data
        run: bun run scripts/extract.ts > /tmp/search-data.json
        # Print summary to the Actions log
      - name: Show extraction summary
        run: |
          echo "Extracted $(cat /tmp/search-data.json | bun -e 'const d=await Bun.stdin.json(); console.log(d.length)') constructs."

      - name: Build site
        run: |
          mkdir -p dist
          # Inject the search data into index.html, replacing the placeholder comment
          bun -e "
            const html   = await Bun.file('site/index.html').text();
            const data   = await Bun.file('/tmp/search-data.json').text();
            const script = '<script>window.SEARCH_DATA = ' + data + ';<\/script>';
            const out    = html.replace('<!-- SEARCH_DATA_PLACEHOLDER -->', script);
            await Bun.write('dist/index.html', out);
            console.log('dist/index.html written (' + out.length.toLocaleString() + ' bytes)');
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
