<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDK Search</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.43/dist/flexsearch.bundle.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            aws: {
              orange: '#FF9900',
              dark:   '#232F3E',
              blue:   '#146EB4',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

  <!-- Header -->
  <header class="bg-aws-dark text-white px-6 py-4 shadow-md">
    <div class="max-w-5xl mx-auto flex items-center gap-3">
      <svg class="w-7 h-7 text-aws-orange flex-shrink-0" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
      </svg>
      <div>
        <h1 class="text-lg font-bold leading-tight">CDK Search</h1>
        <p class="text-xs text-gray-400 leading-tight">Search the AWS CDK construct library</p>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="max-w-5xl mx-auto px-4 py-8">

    <!-- Search bar -->
    <div class="relative mb-4">
      <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input
        id="search-input"
        type="search"
        placeholder="Search constructs… e.g. CfnBucket, aws-lambda, S3"
        class="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 bg-white shadow-sm text-sm focus:outline-none focus:ring-2 focus:ring-aws-blue focus:border-transparent"
        autocomplete="off"
        spellcheck="false"
      />
    </div>

    <!-- Filter pills -->
    <div id="filter-bar" class="flex flex-wrap gap-2 mb-6">
      <!-- Pills are rendered by JS -->
    </div>

    <!-- Result count -->
    <p id="result-count" class="text-xs text-gray-500 mb-3"></p>

    <!-- Results list -->
    <div id="results" class="space-y-2"></div>

  </main>

  <!-- Search data injected at build time -->
  <!-- SEARCH_DATA_PLACEHOLDER -->

  <script>
  (() => {
    // ------------------------------------------------------------------
    // Data + index
    // ------------------------------------------------------------------
    const DATA = window.SEARCH_DATA ?? [];

    // Collect all unique tags across entries (for filter pills)
    const ALL_TAGS = [...new Set(DATA.flatMap(e => e.tags))].sort();

    // Build FlexSearch document index
    const index = new FlexSearch.Document({
      document: {
        id: 'id',
        index: [
          { field: 'name',        tokenize: 'forward', resolution: 9 },
          { field: 'cfnType',     tokenize: 'forward', resolution: 7 },
          { field: 'module',      tokenize: 'forward', resolution: 5 },
          { field: 'description', tokenize: 'strict',  resolution: 3 },
        ],
        store: true,
      },
    });

    DATA.forEach(entry => index.add(entry));

    // ------------------------------------------------------------------
    // State
    // ------------------------------------------------------------------
    let query       = '';
    let activeTags  = new Set();  // empty = no filter (show all)

    // ------------------------------------------------------------------
    // Render helpers
    // ------------------------------------------------------------------

    const TAG_STYLES = {
      l1: 'bg-purple-100 text-purple-700',
      l2: 'bg-blue-100 text-blue-700',
      l3: 'bg-green-100 text-green-700',
    };

    function tagClass(tag) {
      return TAG_STYLES[tag] ?? 'bg-gray-100 text-gray-600';
    }

    function renderPill(tag, active) {
      const base   = 'px-3 py-1 rounded-full text-xs font-medium cursor-pointer border transition-colors select-none';
      const on     = 'bg-aws-dark text-white border-aws-dark';
      const off    = `${tagClass(tag)} border-transparent hover:border-gray-400`;
      return `<button
        class="${base} ${active ? on : off}"
        data-tag="${tag}"
        onclick="toggleTag('${tag}')"
      >${tag}</button>`;
    }

    function renderCard(entry) {
      const tagPills = entry.tags
        .map(t => `<span class="px-2 py-0.5 rounded text-xs font-medium ${tagClass(t)}">${t}</span>`)
        .join(' ');

      const desc = entry.description
        ? `<p class="text-xs text-gray-500 mt-1 line-clamp-2">${entry.description}</p>`
        : '';

      return `<div class="bg-white rounded-lg border border-gray-200 px-4 py-3 flex items-start justify-between gap-4 hover:border-gray-300 transition-colors">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-mono font-semibold text-sm text-gray-900">${entry.name}</span>
            <span class="text-xs text-gray-400">${entry.module}</span>
            ${tagPills}
          </div>
          ${desc}
        </div>
        <a
          href="${entry.docsUrl}"
          target="_blank"
          rel="noopener noreferrer"
          class="flex-shrink-0 text-xs font-medium text-aws-blue hover:underline whitespace-nowrap mt-0.5"
        >CDK Docs ↗</a>
      </div>`;
    }

    // ------------------------------------------------------------------
    // Search + filter logic
    // ------------------------------------------------------------------

    function getResults() {
      let results;

      if (query.trim() === '') {
        // No query — use all data
        results = DATA;
      } else {
        // FlexSearch returns [{field, result:[id,...]}, ...] — dedupe by id
        const raw = index.search(query, { limit: 200, enrich: true });
        const seen = new Set();
        results = [];
        for (const fieldResult of raw) {
          for (const match of fieldResult.result) {
            if (!seen.has(match.id)) {
              seen.add(match.id);
              results.push(match.doc);
            }
          }
        }
      }

      // Apply active tag filters (AND logic across all active tags)
      if (activeTags.size > 0) {
        results = results.filter(e => [...activeTags].every(t => e.tags.includes(t)));
      }

      return results;
    }

    function render() {
      const results = getResults();

      // Result count
      const countEl = document.getElementById('result-count');
      if (query.trim() === '' && activeTags.size === 0) {
        countEl.textContent = `${DATA.length.toLocaleString()} constructs indexed`;
      } else {
        countEl.textContent = `${results.length.toLocaleString()} result${results.length !== 1 ? 's' : ''}`;
      }

      // Results — cap at 100 for performance
      const shown = results.slice(0, 100);
      const resultsEl = document.getElementById('results');
      if (shown.length === 0) {
        resultsEl.innerHTML = `<p class="text-sm text-gray-500 py-8 text-center">No constructs found.</p>`;
      } else {
        resultsEl.innerHTML = shown.map(renderCard).join('');
        if (results.length > 100) {
          resultsEl.innerHTML += `<p class="text-xs text-gray-400 text-center pt-4">Showing 100 of ${results.length.toLocaleString()} results — refine your search to see more.</p>`;
        }
      }
    }

    function renderFilterBar() {
      const bar = document.getElementById('filter-bar');
      bar.innerHTML = ALL_TAGS.map(t => renderPill(t, activeTags.has(t))).join('');
    }

    // ------------------------------------------------------------------
    // Event handlers
    // ------------------------------------------------------------------

    // Exposed globally so onclick= attribute works
    window.toggleTag = function(tag) {
      if (activeTags.has(tag)) {
        activeTags.delete(tag);
      } else {
        activeTags.add(tag);
      }
      renderFilterBar();
      render();
    };

    let debounceTimer;
    document.getElementById('search-input').addEventListener('input', e => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        query = e.target.value;
        render();
      }, 120);
    });

    // ------------------------------------------------------------------
    // Initial render
    // ------------------------------------------------------------------
    renderFilterBar();
    render();
  })();
  </script>

</body>
</html>
